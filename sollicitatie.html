<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sollicitaties - Aqua Roleplay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Solliciteren bij Aqua Roleplay</h1>

    <form id="sollicitatieForm">

        <input
            type="text"
            id="naam"
            placeholder="Discord Naam"
            required
        >

        <select id="functie">
            <option>Politie</option>
            <option>Ambulance</option>
            <option>Brandweer</option>
            <option>Staff</option>
            <option>Developer</option>
        </select>

        <textarea
            id="motivatie"
            placeholder="Waarom moeten wij jou aannemen?"
            required
        ></textarea>

        <button type="submit">
            Versturen
        </button>

    </form>

    <script src="sollicitatie.js"></script>

</body>
</html>
